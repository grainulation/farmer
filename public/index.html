<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<title>Farmer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0e1a'/><path d='M32,3.84 L18.18,3.84 C8.04,13.98 8.04,45.52 18.18,60.16 L32,60.16' fill='none' stroke='%233b82f6' stroke-width='1.28' stroke-linecap='round' stroke-linejoin='round'/><text x='32' y='33' text-anchor='middle' dominant-baseline='central' fill='%233b82f6' font-family='-apple-system,system-ui,sans-serif' font-size='24' font-weight='700'>F</text></svg>">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: rgba(255,255,255,0.06);
    --bg3: rgba(255,255,255,0.10);
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.12);
    --glass-blur: 0px; /* was 20px — disabled for mobile perf */
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --dim: #64748b;
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; max-width: 100vw; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.06) 0%, transparent 50%);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; max-width: 100vw; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    padding-top: calc(12px + env(safe-area-inset-top));
    padding-inline-start: calc(24px + env(safe-area-inset-left));
    padding-inline-end: calc(24px + env(safe-area-inset-right));
    background: var(--glass);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #f0a030, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .header .dot.connected { background: var(--green); }
  .trust-badge {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 12px;
    margin-inline-start: 8px;
  }
  .trust-badge.paranoid { background: rgba(239,68,68,0.15); color: var(--red); }
  .trust-badge.standard { background: rgba(245,158,11,0.15); color: var(--orange); }
  .trust-badge.autonomous { background: rgba(34,197,94,0.15); color: var(--green); }

  /* f004: CLI blocking visibility banner */
  .heartbeat-banner {
    display: none;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    animation: hb-slide-in 0.3s ease-out;
  }
  .heartbeat-banner.blocked {
    display: block;
    background: rgba(239,68,68,0.18);
    color: var(--red);
    border-bottom: 1px solid rgba(239,68,68,0.3);
  }
  .heartbeat-banner .hb-sub {
    font-weight: 400;
    font-size: 11px;
    opacity: 0.8;
    margin-top: 2px;
  }
  @keyframes hb-slide-in {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* p065: connection-lost banner */
  .connection-banner {
    display: none;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    animation: hb-slide-in 0.3s ease-out;
  }
  .connection-banner.disconnected {
    display: block;
    background: rgba(245,158,11,0.18);
    color: var(--orange);
    border-bottom: 1px solid rgba(245,158,11,0.3);
  }
  .connection-banner.failed {
    display: block;
    background: rgba(239,68,68,0.18);
    color: var(--red);
    border-bottom: 1px solid rgba(239,68,68,0.3);
  }
  .connection-banner .conn-sub {
    font-weight: 400;
    font-size: 11px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .connection-banner .reconnect-btn {
    display: inline-block;
    margin-top: 6px;
    padding: 4px 16px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid currentColor;
    border-radius: 6px;
    background: transparent;
    color: inherit;
    cursor: pointer;
  }
  .connection-banner .reconnect-btn:hover {
    background: rgba(255,255,255,0.1);
  }

  .tabs {
    display: flex;
    gap: 0;
    background: var(--glass);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
    padding: 0 24px;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }
  .tab { position: relative; padding-inline-end: 28px; }
  .tab .badge {
    position: absolute;
    top: 6px;
    right: 4px;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    text-align: center;
    padding: 0 4px;
    border-radius: 8px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Hide scrollbars but keep scrolling (Safari/iOS) */
  .content, .tabs, .session-bar { scrollbar-width: none; -ms-overflow-style: none; }
  .content::-webkit-scrollbar, .tabs::-webkit-scrollbar, .session-bar::-webkit-scrollbar { display: none; }

  .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px 24px 44px; max-width: 100%; word-break: break-word; }

  /* Permissions View */
  .perm-card {
    background: var(--glass);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border-inline-start: 4px solid var(--orange);
  }
  .perm-card.new-card { animation: slideIn 0.3s ease-out; }
  .perm-card.resolved { opacity: 0.5; border-inline-start-color: var(--dim); }
  .perm-card.danger { border-inline-start-color: var(--red); background: rgba(239,68,68,0.05); }
  .perm-card.danger .tool-name { color: var(--red); }
  /* r372: risk severity colors */
  .perm-card.risk-safe { border-inline-start-color: var(--green); }
  .perm-card.risk-safe .tool-name { color: var(--green); }
  .perm-card.risk-write { border-inline-start-color: var(--orange); }
  .perm-card.risk-write .tool-name { color: var(--orange); }
  .perm-card.risk-danger { border-inline-start-color: var(--red); background: rgba(239,68,68,0.05); }
  .perm-card.risk-danger .tool-name { color: var(--red); }
  .risk-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
    margin-inline-start: 8px;
    vertical-align: middle;
  }
  .risk-badge.risk-safe { color: var(--green); background: rgba(34,197,94,0.12); }
  .risk-badge.risk-write { color: var(--orange); background: rgba(245,158,11,0.12); }
  .risk-badge.risk-danger { color: var(--red); background: rgba(239,68,68,0.12); }
  /* r373: keyboard focus highlight on permission cards */
  .perm-card.kb-focused {
    outline: 2px solid var(--accent-light);
    outline-offset: 2px;
    box-shadow: 0 0 12px rgba(96,165,250,0.2);
  }
  .perm-card.question-card { border-inline-start-color: var(--accent); }
  .perm-card .tool-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .perm-card.question-card .tool-name { color: var(--accent-light); }
  .perm-card .tool-input {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 8px;
    margin: 8px 0;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    border: 1px solid var(--glass-border);
    max-height: 200px;
    overflow-y: auto;
  }
  .perm-card .meta {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 12px;
  }
  .perm-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 24px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-allow { background: var(--green); color: #000; }
  .btn-allow:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-deny { background: var(--red); color: #fff; }
  .btn-deny:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-sm { padding: 4px 12px; font-size: 12px; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-blue:hover { filter: brightness(1.1); transform: translateY(-1px); }

  /* Quick rules dropdown */
  .quick-rules {
    position: relative;
    margin-inline-start: auto;
  }
  .quick-rules-btn {
    padding: 6px 12px;
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-rules-btn:hover { color: var(--text); border-color: var(--accent); }
  .quick-rules-menu {
    display: none;
    position: absolute;
    right: 0;
    bottom: 100%;
    margin-bottom: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 0;
    min-width: 260px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .quick-rules-menu.open { display: block; }
  .quick-rules-menu .qr-item {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.1s;
  }
  .quick-rules-menu .qr-item:hover {
    background: var(--bg3);
    color: var(--text);
  }

  /* Question input */
  .question-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text);
    border-radius: 8px;
    font-size: 16px; /* 16px prevents iOS Safari auto-zoom on focus */
    font-family: inherit;
    margin-top: 8px;
    resize: vertical;
    min-height: 40px;
  }
  .question-input:focus { outline: none; border-color: var(--accent-light); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

  /* Activity View */
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .activity-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .activity-icon.success { background: rgba(34,197,94,0.15); color: var(--green); }
  .activity-icon.failure { background: rgba(239,68,68,0.15); color: var(--red); }
  .activity-icon.decision { background: rgba(59,130,246,0.15); color: var(--accent-light); }
  .activity-tool { font-weight: 600; color: var(--text); }
  .activity-detail { color: var(--muted); font-family: monospace; font-size: 12px; }
  .activity-time { color: var(--dim); font-size: 11px; margin-inline-start: auto; flex-shrink: 0; }

  /* Claims View */
  .claim-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .claim-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .claim-id {
    font-family: monospace;
    font-size: 12px;
    color: var(--accent-light);
    background: rgba(59,130,246,0.12);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .claim-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .claim-type.constraint { color: var(--red); background: rgba(239,68,68,0.12); }
  .claim-type.factual { color: var(--green); background: rgba(34,197,94,0.12); }
  .claim-type.risk { color: var(--orange); background: rgba(245,158,11,0.12); }
  .claim-type.recommendation { color: var(--purple); background: rgba(167,139,250,0.12); }
  .claim-type.estimate { color: var(--accent-light); background: rgba(59,130,246,0.12); }
  .claim-type.feedback { color: #f472b6; background: rgba(244,114,182,0.12); }
  .claim-topic { font-size: 11px; color: var(--dim); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .claim-content { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .claim-evidence {
    font-size: 11px; margin-top: 8px; color: var(--dim);
  }
  .evidence-bar {
    display: inline-block;
    height: 4px;
    border-radius: 2px;
    margin-inline-end: 6px;
    vertical-align: middle;
  }
  .evidence-bar.stated { width: 20px; background: var(--dim); }
  .evidence-bar.web { width: 35px; background: var(--orange); }
  .evidence-bar.documented { width: 55px; background: var(--accent); }
  .evidence-bar.tested { width: 75px; background: var(--green); }
  .evidence-bar.production { width: 100px; background: var(--purple); }

  /* Sprint Status */
  .sprint-meta {
    background: var(--bg2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .sprint-meta h2 { font-size: 18px; margin-bottom: 8px; }
  .sprint-meta .question { font-size: 14px; color: var(--muted); }

  /* Sprint switcher */
  .sprint-switcher-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg2);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .sprint-switcher-header:hover { border-color: var(--accent); }
  .sprint-switcher-header .active-name { font-size: 14px; font-weight: 600; }
  .sprint-switcher-header .toggle { font-size: 12px; color: var(--muted); }
  .sprint-card-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .sprint-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sprint-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .sprint-card.active-sprint { border-color: var(--accent); background: rgba(59,130,246,0.08); }
  .sprint-card .sprint-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .sprint-card .sprint-card-meta { font-size: 11px; color: var(--dim); display: flex; gap: 10px; flex-wrap: wrap; }
  .phase-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 8px;
    display: inline-block;
  }
  .phase-badge.define { background: rgba(167,139,250,0.15); color: var(--purple); }
  .phase-badge.research { background: rgba(96,165,250,0.15); color: var(--accent-light); }
  .phase-badge.prototype { background: rgba(245,158,11,0.15); color: var(--orange); }
  .phase-badge.evaluate { background: rgba(34,197,94,0.15); color: var(--green); }
  .phase-badge.archived { background: rgba(100,116,139,0.15); color: var(--dim); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .stat-card {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Topic filter */
  .topic-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .topic-chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .topic-chip:hover, .topic-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Rules View */
  .rules-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .rules-section h3 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  .trust-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .trust-btn {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 13px;
  }
  .trust-btn:hover { border-color: var(--dim); color: var(--text); }
  .trust-btn.active { border-color: var(--accent); color: var(--text); background: rgba(59,130,246,0.08); }
  .trust-btn .trust-label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 4px; }
  .trust-btn .trust-desc { font-size: 11px; color: var(--dim); }
  .trust-btn.active .trust-desc { color: var(--muted); }

  .rule-category {
    margin-bottom: 16px;
  }
  .rule-category-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .rule-checkboxes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .rule-check {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    user-select: none;
  }
  .rule-check:hover { border-color: var(--dim); }
  .rule-check.active { border-color: var(--green); background: rgba(34,197,94,0.08); color: var(--green); }
  .rule-check input[type="checkbox"] { display: none; }

  .active-rules-list {
    margin-top: 12px;
  }
  .active-rule-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .active-rule-item .rule-tool {
    font-weight: 600;
    color: var(--green);
  }
  .active-rule-item .rule-pattern {
    font-family: monospace;
    font-size: 12px;
    color: var(--dim);
  }
  .active-rule-item .rule-remove {
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .active-rule-item .rule-remove:hover { opacity: 1; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  /* Session pill bar */
  .session-bar {
    position: fixed;
    bottom: 0;
    left: 0;

<script>
// ── i18n passthrough ──
const t = (s, v) => v ? s.replace(/\{(\w+)\}/g, (_, k) => v[k] ?? k) : s;
const _dtf = new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeStyle: 'short' });
const _tf = new Intl.DateTimeFormat(undefined, { timeStyle: 'short' });
const _df = new Intl.DateTimeFormat(undefined, { dateStyle: 'medium' });

const TOKEN = '{{TOKEN}}';
// Cookie auth is primary (HttpOnly cookie set on login redirect).
// Token fallback for SSE which doesn't send cookies cross-origin in some browsers.
const API = (path) => `${location.origin}${path}`;
const isRequest = (name) => name === 'Request' || name === 'AskUserQuestion';

// --- CSRF token (received from server init/state, sent on all mutating requests) ---
let csrfToken = '';

function postJSON(url, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
  return fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
}

let evtSource;
let state = { pending: [], activity: [], messages: [], claims: null, compilation: null, trustLevel: 'paranoid', sessionRules: [], agents: [], sprints: [], activeSprint: null, sessions: [] };
let activeTab = 'permissions';
let topicFilter = null;
let openQuickRules = null; // requestId of open quick-rules dropdown
let seenCardIds = new Set(); // track seen cards to avoid re-animating
let sessionFilter = null;   // null = all sessions, string = filter to that session_id

// Session color helper — deterministic hue from session_id (matches server)
function sessionHue(id) {
  if (!id) return 0;
  let hash = 0;
  for (let i = 0; i < id.length; i++) {
    hash = ((hash << 5) - hash + id.charCodeAt(i)) | 0;
  }
  return Math.abs(hash) % 360;
}
function sessionColor(id) {
  if (!id || id === 'default') return 'var(--dim)';
  return `hsl(${sessionHue(id)}, 70%, 50%)`;
}

function setSessionFilter(sessionId) {
  sessionFilter = sessionFilter === sessionId ? null : sessionId;
  renderSessionBar();
  render();
}

// x016: session pagination — show max 5 expanded, rest collapsed
const MAX_VISIBLE_SESSIONS = 5;
let showAllSessions = false;

function toggleShowAllSessions() {
  showAllSessions = !showAllSessions;
  renderSessionBar();
}

function renderSessionBar() {
  const bar = document.getElementById('sessionBar');
  const ss = state.sessions || [];
  // Hide bar in single-session mode (only "default" or empty)
  if (ss.length <= 1 && (!ss[0] || ss[0].id === 'default')) {
    bar.className = 'session-bar hidden';
    return;
  }
  bar.className = 'session-bar';

  // x016: session count indicator
  const countIndicator = ss.length > MAX_VISIBLE_SESSIONS
    ? `<div class="session-count">${ss.length} sessions</div>`
    : '';

  // Sort: active with pending first, then active, then stale, then ended
  const sorted = [...ss].sort((a, b) => {
    const score = s => (s.pending_count > 0 ? 0 : s.status === 'active' ? 1 : s.status === 'stale' ? 2 : 3);
    return score(a) - score(b);
  });

  // x016: collapse sessions beyond MAX_VISIBLE_SESSIONS unless expanded
  const visible = showAllSessions ? sorted : sorted.slice(0, MAX_VISIBLE_SESSIONS);
  const hiddenCount = sorted.length - visible.length;

  const allPill = `<div class="session-pill ${!sessionFilter ? 'active' : ''}" onclick="setSessionFilter(null)">All</div>`;
  const pills = visible.map(s => {
    const isActive = sessionFilter === s.id;
    const hasPending = (s.pending_count || 0) > 0;
    const statusCls = s.status === 'ended' ? ' ended' : s.status === 'stale' ? ' stale' : '';
    return `<div class="session-pill${isActive ? ' active' : ''}${hasPending ? ' has-pending' : ''}" onclick="setSessionFilter('${esc(s.id)}')" data-session-id="${esc(s.id)}">
      <span class="sdot${statusCls}" style="background:${sessionColor(s.id)}"></span>
      <span>${esc(s.label)}</span>
      ${hasPending ? `<span class="spending">${s.pending_count}</span>` : ''}
    </div>`;
  }).join('');

  const expandBtn = hiddenCount > 0
    ? `<div class="session-pill" onclick="toggleShowAllSessions()" style="opacity:0.6;font-style:italic;">+${hiddenCount} more</div>`
    : (showAllSessions && sorted.length > MAX_VISIBLE_SESSIONS
      ? `<div class="session-pill" onclick="toggleShowAllSessions()" style="opacity:0.6;font-style:italic;">show less</div>`
      : '');

  bar.innerHTML = countIndicator + allPill + pills + expandBtn;
}

// Filter items by session
function filterBySession(items) {
  if (!sessionFilter) return items;
  return items.filter(i => (i.session_id || 'default') === sessionFilter);
}

// Session tag HTML for cards
function sessionTag(sessionId) {
  if (!sessionId || sessionId === 'default') return '';
  const label = (state.sessions || []).find(s => s.id === sessionId);
  const displayLabel = label ? label.label : sessionId.slice(0, 8);
  return `<span class="session-tag"><span class="sdot" style="background:${sessionColor(sessionId)}"></span>${esc(displayLabel)}</span>`;
}

// --- Connection: WebSocket > SSE > polling (cascade fallback) ---
let pollInterval = null;
let ws = null;
let liveTransport = null; // 'ws' | 'sse' | null

function connect() {
  // Always start polling immediately as baseline
  poll();
  pollInterval = setInterval(poll, 2000);
  setInterval(tickCountdowns, 1000);

  // Try WebSocket first (works through Cloudflare tunnels)
  tryWebSocket();
}

let wsRetryCount = 0;
const WS_RETRY_MAX = 5;
const WS_RETRY_BASE_MS = 1000;
let wsRetryTimer = null;

function tryWebSocket() {
  try {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    // x005: no token in URL — authenticate via first message after connect
    const wsUrl = `${wsProto}//${location.host}/ws`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      // x005: send token as first message for authentication
      ws.send(JSON.stringify({ type: 'auth', token: TOKEN }));
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'error') {
          // Auth failed or server error
          console.warn('WS error:', msg.data);
          try { ws.close(); } catch {}
          return;
        }
        // Successfully receiving data means we're authenticated
        if (liveTransport !== 'ws') {
          liveTransport = 'ws';
          wsRetryCount = 0; // reset backoff on successful connection
          updateConnectionBanner(null); // p065: clear disconnection banner
        }
        handleMessage(msg);
        document.getElementById('statusDot').className = 'dot connected';
        document.getElementById('statusText').textContent = t('Connected (WebSocket)');
      } catch { /* ignore malformed frames */ }
    };

    ws.onclose = () => {
      const wasWs = liveTransport === 'ws';
      if (wasWs) liveTransport = null;
      ws = null;
      // x009: retry WebSocket with exponential backoff before falling to SSE
      scheduleWsRetry(wasWs);
    };

    ws.onerror = () => {
      liveTransport = null;
      try { ws.close(); } catch {}
      ws = null;
      // x009: retry handled by onclose (which fires after onerror)
    };
  } catch {
    // WebSocket constructor failed — schedule retry or fall back to SSE
    scheduleWsRetry(false);
  }
}

// x009+p065: exponential backoff with jitter for WebSocket reconnection
function scheduleWsRetry(hadConnection) {
  if (wsRetryTimer) return; // already scheduled
  if (wsRetryCount >= WS_RETRY_MAX) {
    // Exhausted retries — fall back to SSE
    wsRetryCount = 0;
    updateConnectionBanner('disconnected', 0, 0); // briefly show before SSE takes over
    trySSE();
    return;
  }
  const baseDelay = WS_RETRY_BASE_MS * Math.pow(2, wsRetryCount);
  const jitter = Math.random() * baseDelay * 0.3; // p065: up to 30% jitter
  const delay = baseDelay + jitter;
  wsRetryCount++;
  if (hadConnection) updateConnectionBanner('disconnected', wsRetryCount, WS_RETRY_MAX);
  document.getElementById('statusDot').className = 'dot';
  document.getElementById('statusText').textContent = t('Reconnecting WS ({count}/{max})...', { count: wsRetryCount, max: WS_RETRY_MAX });
  wsRetryTimer = setTimeout(() => {
    wsRetryTimer = null;
    if (liveTransport === 'ws') return; // already reconnected
    tryWebSocket();
  }, delay);
}

// p065: SSE reconnect with exponential backoff + jitter
let sseRetryCount = 0;
const SSE_RETRY_MAX = 5;
const SSE_RETRY_BASE_MS = 1000;
const SSE_RETRY_MAX_MS = 30000;
let sseRetryTimer = null;

function trySSE() {
  // Don't try SSE if WebSocket is already connected
  if (liveTransport === 'ws') return;
  try {
    evtSource = new EventSource(`${location.origin}/events?token=${TOKEN}`);
    evtSource.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
      if (liveTransport !== 'sse') {
        liveTransport = 'sse';
        sseRetryCount = 0; // reset backoff on successful connection
        updateConnectionBanner(null); // clear any disconnection banner
      }
      document.getElementById('statusDot').className = 'dot connected';
      document.getElementById('statusText').textContent = t('Connected (SSE)');
    };
    evtSource.onerror = () => {
      evtSource.close();
      evtSource = null;
      liveTransport = null;
      scheduleSSERetry();
    };
  } catch {
    scheduleSSERetry();
  }
}

function scheduleSSERetry() {
  if (sseRetryTimer) return; // already scheduled
  if (sseRetryCount >= SSE_RETRY_MAX) {
    // Exhausted retries — show reconnect button, polling still runs
    updateConnectionBanner('failed');
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = t('Disconnected');
    return;
  }
  const baseDelay = Math.min(SSE_RETRY_BASE_MS * Math.pow(2, sseRetryCount), SSE_RETRY_MAX_MS);
  const jitter = Math.random() * baseDelay * 0.3; // up to 30% jitter
  const delay = baseDelay + jitter;
  sseRetryCount++;
  updateConnectionBanner('disconnected', sseRetryCount, SSE_RETRY_MAX);
  document.getElementById('statusDot').className = 'dot';
  document.getElementById('statusText').textContent = t('Reconnecting SSE ({count}/{max})...', { count: sseRetryCount, max: SSE_RETRY_MAX });
  sseRetryTimer = setTimeout(() => {
    sseRetryTimer = null;
    if (liveTransport === 'sse' || liveTransport === 'ws') return;
    trySSE();
  }, delay);
}

// p065: on reconnect, request full state refresh to catch up on missed events
async function refreshFullState() {
  try {
    const res = await fetch(`${location.origin}/api/state?token=${TOKEN}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.csrfToken) csrfToken = data.csrfToken;
    handleMessage({ type: 'state', data });
    render();
  } catch { /* poll will catch up */ }
}

// p065: connection banner management
function updateConnectionBanner(state, attempt, max) {
  const banner = document.getElementById('connectionBanner');
  if (!banner) return;
  if (!state) {
    banner.className = 'connection-banner';
    banner.innerHTML = '';
    // On reconnect, fetch full state to catch up on missed events
    refreshFullState();
    return;
  }
  if (state === 'disconnected') {
    banner.className = 'connection-banner disconnected';
    banner.innerHTML = t('Connection lost — reconnecting ({attempt}/{max})...', { attempt, max }) + '<div class="conn-sub">' + t('Polling is active as fallback') + '</div>';
  } else if (state === 'failed') {
    banner.className = 'connection-banner failed';
    banner.innerHTML = t('Connection lost — realtime updates unavailable') + '<div class="conn-sub">' + t('Polling is active as fallback') + '</div><button class="reconnect-btn" onclick="manualReconnect()">' + t('Reconnect') + '</button>';
  }
}

function manualReconnect() {
  sseRetryCount = 0;
  wsRetryCount = 0;
  updateConnectionBanner(null);
  if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }
  if (sseRetryTimer) { clearTimeout(sseRetryTimer); sseRetryTimer = null; }
  tryWebSocket();
}

let prevPendingIds = new Set();
let lastPollHash = '';

async function poll() {
  try {
    const res = await fetch(`${location.origin}/api/state?token=${TOKEN}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    // Update CSRF token from poll response
    if (data.csrfToken) csrfToken = data.csrfToken;

    // Detect new pending items for notifications
    const newPending = (data.pending || []);
    for (const p of newPending) {
      const id = p.id || p.requestId;
      if (!prevPendingIds.has(id)) {
        if (p.isQuestion) {
          notify('Claude Code has a question', p.prompt, id);
        } else {
          notify(`${p.tool_name} needs approval`, formatInput(p.tool_input), id);
        }
      }
    }
    prevPendingIds = new Set(newPending.map(p => p.id || p.requestId));

    // Auto-clear stale pending items (older than 2 min = already timed out server-side)
    const now = Date.now();
    const freshPending = newPending.filter(p => !p.timestamp || (now - p.timestamp) < 130000);

    // Only re-render if data actually changed
    const newState = {
      pending: freshPending,
      activity: data.activity || [],
      messages: data.messages || [],
      claims: data.claims,
      compilation: data.compilation,
      trustLevel: data.trustLevel,
      sessionRules: data.sessionRules || [],
      agents: data.agents || [],
      sessions: data.sessions || [],
    };
    const changed = JSON.stringify(newState) !== lastPollHash;
    if (changed) {
      Object.assign(state, newState);
      lastPollHash = JSON.stringify(newState);
      renderSessionBar();
      // Don't re-render if user is typing in an input/textarea (kills focus + text)
      const active = document.activeElement;
      if (!active || (active.tagName !== 'TEXTAREA' && active.tagName !== 'INPUT')) {
        render();
      }
    }
    document.getElementById('statusDot').className = 'dot connected';
    document.getElementById('statusText').textContent = t('Connected (polling)');
  } catch (err) {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = t('Error: ') + (err.message || err);
  }
}

function updateLiveStatus(text) {
  const ls = document.getElementById('live-status');
  if (ls) ls.textContent = text;
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      if (msg.data.csrfToken) csrfToken = msg.data.csrfToken;
      state = { ...state, ...msg.data };
      renderSessionBar();
      updateLiveStatus('Connected: ' + (state.pending || []).length + ' pending permissions');
      break;
    case 'token_rotated':
      // Server rotated the auth token — update cookie via a re-auth fetch
      if (msg.data.newToken) {
        fetch(`${location.origin}/?token=${msg.data.newToken}`, { credentials: 'include', redirect: 'manual' }).catch(() => {});
      }
      break;
    case 'permission_request':
      state.pending.push(msg.data);
      updateLiveStatus('New permission request: ' + (msg.data.tool_name || 'unknown'));
      if (isRequest(msg.data.tool_name || '')) {
        // Auto-switch to Requests tab
        activeTab = 'requests';
        document.querySelectorAll('.tab').forEach(tb => tb.classList.toggle('active', tb.dataset.tab === 'requests'));
      }
      {
        const label = isRequest(msg.data.tool_name) ? 'Question from Claude' : `${msg.data.tool_name} needs approval`;
        notify(label, (msg.data.tool_input && msg.data.tool_input.prompt) || formatInput(msg.data.tool_input), msg.data.requestId);
      }
      break;
    case 'permission_resolved':
      state.pending = state.pending.filter(p => p.requestId !== msg.data.requestId);
      break;
    case 'permission_expired':
      state.pending = state.pending.filter(p => p.requestId !== msg.data.requestId);
      break;
    case 'notification_card':
      if (msg.data.tool_name === 'Message') {
        state.messages.push({ content: msg.data.prompt, timestamp: msg.data.timestamp });
        if (state.messages.length > 50) state.messages.shift();
        // Alert the user — text responses are easy to miss on a phone
        const preview = (msg.data.prompt || '').slice(0, 120);
        notify('Claude responded', preview, 'msg-' + msg.data.requestId);
        showToast('New message from Claude');
      } else {
        state.activity.unshift({ type: 'info', tool_name: msg.data.tool_name, tool_input: { prompt: msg.data.prompt }, timestamp: msg.data.timestamp });
        if (state.activity.length > 200) state.activity.pop();
        notify(msg.data.tool_name || 'Notification', (msg.data.prompt || '').slice(0, 120), 'notif-' + msg.data.requestId);
      }
      break;
    case 'message':
      state.messages.push(msg.data);
      if (state.messages.length > 50) state.messages.shift();
      break;
    case 'auto_approved':
      // Flash in activity, no pending entry
      break;
    case 'activity':
      state.activity.push(msg.data);
      if (state.activity.length > 200) state.activity.shift();
      break;
    case 'claims':
      state.claims = msg.data;
      break;
    case 'compilation':
      state.compilation = msg.data;
      break;
    case 'sprints_list':
      state.sprints = msg.data || [];
      state.activeSprint = (msg.data || []).find(s => s.active)?.slug || null;
      break;
    case 'trust_level':
      state.trustLevel = msg.data.level;
      updateTrustBadge();
      break;
    case 'rules_updated':
      state.sessionRules = msg.data.sessionRules;
      break;
    case 'agent_start':
      state.agents = state.agents.filter(a => a.id !== msg.data.id);
      state.agents.push({ ...msg.data, agent_type: msg.data.agentType, status: 'running', startedAt: Date.now() });
      break;
    case 'agent_stop':
      state.agents = state.agents.map(a => a.id === msg.data.id ? { ...a, status: 'done', stoppedAt: Date.now() } : a);
      break;
    case 'notification':
      notify(msg.data.title, msg.data.body);
      break;
    case 'session_new':
    case 'session_start':
    case 'session_stale':
    case 'session_end': {
      const sd = msg.data;
      const idx = (state.sessions || []).findIndex(s => s.id === sd.id);
      if (idx >= 0) state.sessions[idx] = sd;
      else (state.sessions = state.sessions || []).push(sd);
      renderSessionBar();
      break;
    }
    case 'heartbeat':
      updateHeartbeatBanner(msg.data);
      break;
    case 'feedback_read':
      feedbackPending = false;
      feedbackSent = null;
      break;
  }
  // Don't nuke DOM if user is typing — preserve input focus
  const focused = document.activeElement;
  if (focused && (focused.tagName === 'TEXTAREA' || focused.tagName === 'INPUT')) return;
  render();
}

// --- Heartbeat banner (f004 — CLI blocking visibility) ---
// Only shows when a permission/request is sitting unresolved — "silent" was too noisy
// because the CLI naturally goes quiet between tool calls while thinking.
const BLOCKED_THRESHOLD = 15_000;   // 15s pending unresolved = "may be blocked"

function updateHeartbeatBanner(hb) {
  const banner = document.getElementById('heartbeatBanner');
  if (!banner) return;

  const now = hb.serverTime || Date.now();
  let blocked = false;
  let detail = '';

  for (const s of (hb.sessions || [])) {
    if (s.status === 'ended') continue;

    const hasPending = s.pending_count > 0;
    const oldestPendingAge = s.oldest_pending ? (now - s.oldest_pending) : 0;

    // Blocked: pending permission/request sitting unresolved
    if (hasPending && oldestPendingAge > BLOCKED_THRESHOLD) {
      blocked = true;
      const secs = Math.round(oldestPendingAge / 1000);
      detail = t('{label}: permission waiting {secs}s — check Permissions/Requests tab', { label: s.label, secs });
      break;
    }
  }

  if (blocked) {
    banner.className = 'heartbeat-banner blocked';
    banner.innerHTML = t('CLI may be blocked') + '<div class="hb-sub">' + esc(detail) + '</div>';
    if (!banner._lastNotifiedBlocked) {
      notify(t('CLI blocked — needs attention'), detail, 'cli-blocked');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      banner._lastNotifiedBlocked = true;
    }
  } else {
    banner.className = 'heartbeat-banner';
    banner.innerHTML = '';
    banner._lastNotifiedBlocked = false;
  }
}

// --- Actions ---
const resolvedRequests = new Set(); // f004: track resolved requests so render() skips them

async function decide(requestId, allow) {
  resolvedRequests.add(requestId);
  const card = document.getElementById('perm-' + requestId);
  if (card) {
    const icon = allow ? t('Approved') : t('Denied');
    const label = allow ? t('Approved') : t('Denied');
    const color = allow ? 'var(--green)' : 'var(--red)';
    card.innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:32px;">' + icon + '</div><div style="color:' + color + ';font-weight:700;margin-top:8px;">' + label + '</div></div>';
  }
  try {
    await postJSON(API('/api/decide'), { requestId, allow, reason: allow ? t('Approved remotely') : t('Denied remotely') });
  } catch(e) {}
  setTimeout(() => {
    state.pending = state.pending.filter(p => p.requestId !== requestId);
    resolvedRequests.delete(requestId);
    render();
  }, 1500);
}
async function respondToQuestion(requestId, directVal) {
  const input = document.getElementById('question-input-' + requestId);
  const val = directVal || (input && input.value) || t('Approved remotely');
  if (input) input.blur();
  // Mark as resolved immediately so render() won't re-create the card
  resolvedRequests.add(requestId);
  const card = document.getElementById('perm-' + requestId);
  if (card) {
    card.innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:14px;font-weight:700;color:var(--green);">' + t('Sent') + '</div><div style="color:var(--green);font-weight:700;margin-top:8px;">' + t('Sent!') + '</div><div style="color:var(--dim);font-size:12px;margin-top:4px;">' + esc(val.slice(0, 50)) + '</div></div>';
  }
  try {
    await postJSON(API('/api/decide'), { requestId, allow: true, reason: val, response: val });
  } catch(e) { /* network error — response already sent visually */ }
  setTimeout(() => {
    state.pending = state.pending.filter(p => p.requestId !== requestId);
    resolvedRequests.delete(requestId);
    render();
  }, 1500);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#34d399;color:#000;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:80vw;text-align:center;'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer); t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

function tickCountdowns() {
  document.querySelectorAll('.countdown').forEach(el => {
    const expires = parseInt(el.dataset.expires);
    const remaining = Math.max(0, Math.ceil((expires - Date.now()) / 1000));
    el.textContent = remaining + 's';
    el.style.color = remaining < 30 ? 'var(--red)' : remaining < 60 ? 'var(--orange)' : 'var(--dim)';
  });
}

let sprintSwitcherOpen = false;

async function switchSprint(slug) {
  try {
    const resp = await postJSON(API('/api/switch-sprint'), { slug });
    if (resp.ok) {
      state.activeSprint = slug;
      state.sprints = state.sprints.map(s => ({ ...s, active: s.slug === slug }));
      sprintSwitcherOpen = false;
      render();
    }
  } catch (e) {
    console.error('Switch sprint failed:', e);
  }
}

function toggleSprintSwitcher() {
  sprintSwitcherOpen = !sprintSwitcherOpen;
  render();
}

async function setTrustLevel(level) {
  await postJSON(API('/api/trust-level'), { level });
  state.trustLevel = level;
  updateTrustBadge();
  render();
}

async function toggleRule(tool) {
  const existing = state.sessionRules.find(r => r.tool === tool && !r.pattern);
  const action = existing ? 'remove' : 'add';
  const resp = await postJSON(API('/api/rules'), { action, rule: { tool } });
  const data = await resp.json();
  if (data.sessionRules) state.sessionRules = data.sessionRules;
  render();
}

async function addQuickRule(tool) {
  const existing = state.sessionRules.find(r => r.tool === tool && !r.pattern);
  if (!existing) {
    const resp = await postJSON(API('/api/rules'), { action: 'add', rule: { tool } });
    const data = await resp.json();
    if (data.sessionRules) state.sessionRules = data.sessionRules;
  }
  openQuickRules = null;
  render();
}

async function addQuickRuleGroup(tools) {
  for (const tool of tools) {
    const existing = state.sessionRules.find(r => r.tool === tool && !r.pattern);
    if (!existing) {
      const resp = await postJSON(API('/api/rules'), { action: 'add', rule: { tool } });
      const data = await resp.json();
      if (data.sessionRules) state.sessionRules = data.sessionRules;
    }
  }
  openQuickRules = null;
  render();
}

async function removeRule(tool, pattern) {
  const resp = await postJSON(API('/api/rules'), { action: 'remove', rule: { tool, pattern: pattern || undefined } });
  const data = await resp.json();
  if (data.sessionRules) state.sessionRules = data.sessionRules;
  render();
}

function toggleQuickRulesMenu(requestId, event) {
  event.stopPropagation();
  openQuickRules = openQuickRules === requestId ? null : requestId;
  render();
}

function updateTrustBadge() {
  const badge = document.getElementById('trustBadge');
  badge.textContent = state.trustLevel;
  badge.className = 'trust-badge ' + state.trustLevel;
  badge.setAttribute('aria-label', t('Trust level: ') + state.trustLevel);
}

// --- Desktop detection ---
function isDesktop() {
  return window.innerWidth >= 1024;
}

// Track which desktop nav tab is active (for non-split views like claims, sprint, rules, agents)
let desktopNavTab = null; // null = split view (permissions+activity), or 'claims'|'sprint'|'rules'|'agents'|'requests'

// Track expanded activity items on desktop
let expandedActivityIds = new Set();

function toggleActivityExpand(idx) {
  if (expandedActivityIds.has(idx)) expandedActivityIds.delete(idx);
  else expandedActivityIds.add(idx);
  renderDesktopMain();
}

function setDesktopNav(tab) {
  desktopNavTab = desktopNavTab === tab ? null : tab;
  renderDesktopSidebar();
  renderDesktopMain();
}

function setDesktopSessionFilter(sessionId) {
  sessionFilter = sessionFilter === sessionId ? null : sessionId;
  renderDesktopSidebar();
  renderDesktopMain();
  // Also keep mobile in sync
  renderSessionBar();
}

function renderDesktopSidebar() {
  const sidebar = document.getElementById('desktopSidebar');
  if (!sidebar) return;

  const ss = state.sessions || [];
  const perms = state.pending.filter(p => !isRequest(p.tool_name || '') && !resolvedRequests.has(p.requestId));
  const reqs = state.pending.filter(p => isRequest(p.tool_name || '') && !resolvedRequests.has(p.requestId));
  const runningAgents = state.agents.filter(a => a.status === 'running').length;

  // Session list
  const sessionItems = (() => {
    const sorted = [...ss].sort((a, b) => {
      const score = s => (s.pending_count > 0 ? 0 : s.status === 'active' ? 1 : s.status === 'stale' ? 2 : 3);
      return score(a) - score(b);
    });
    return sorted.map(s => {
      const isActive = sessionFilter === s.id;
      const hasPending = (s.pending_count || 0) > 0;
      const statusCls = s.status === 'ended' ? ' ended' : s.status === 'stale' ? ' stale' : '';
      const lastActivity = s.last_activity ? timeAgo(s.last_activity) : '';
      return `<div class="sidebar-session${isActive ? ' active' : ''}" onclick="setDesktopSessionFilter('${esc(s.id)}')">
        <span class="ss-dot${statusCls}" style="background:${sessionColor(s.id)}"></span>
        <span class="ss-name">${esc(s.label)}</span>
        ${hasPending ? `<span class="ss-badge">${s.pending_count}</span>` : ''}
        ${lastActivity ? `<span class="ss-time">${lastActivity}</span>` : ''}
      </div>`;
    }).join('');
  })();

  // Nav items at bottom
  const navItems = [
    { tab: null, label: t('Dashboard'), badge: perms.length > 0 ? perms.length : 0 },
    { tab: 'requests', label: t('Requests'), badge: reqs.length },
    { tab: 'claims', label: t('Claims'), badge: 0 },
    { tab: 'sprint', label: t('Sprint'), badge: 0 },
    { tab: 'rules', label: t('Rules'), badge: 0 },
    { tab: 'agents', label: t('Agents'), badge: runningAgents },
  ];

  sidebar.innerHTML = `
    <div class="sidebar-title">${t('Sessions')}</div>
    <div class="sidebar-session${!sessionFilter ? ' active' : ''}" onclick="setDesktopSessionFilter(null)">
      <span class="ss-dot" style="background:var(--muted)"></span>
      <span class="ss-name">${t('All Sessions')}</span>
    </div>
    ${sessionItems}
    <div class="sidebar-nav">
      ${navItems.map(n => `
        <div class="sidebar-nav-item${desktopNavTab === n.tab ? ' active' : ''}" onclick="setDesktopNav(${n.tab === null ? 'null' : "'" + n.tab + "'"})">
          <span>${esc(n.label)}</span>
          ${n.badge > 0 ? `<span class="nav-badge">${n.badge}</span>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderDesktopActivityItem(a, idx) {
  const d = describeAction(a);
  const isExpanded = expandedActivityIds.has(idx);
  const detail = d.detail || '';

  // Color class based on decision
  let actClass = '';
  if (a.decision === 'allowed' || a.decision === 'approved') actClass = 'act-approve';
  else if (a.decision === 'denied') actClass = 'act-deny';
  else if (a.decision === 'auto-allowed') actClass = 'act-auto';

  const decisionLabel = a.decision === 'auto-allowed'
    ? `<span style="color:var(--dim);font-size:11px;">${t('auto')}</span>`
    : a.decision === 'allowed'
      ? `<span style="color:var(--green);font-size:11px;">${t('approved')}</span>`
      : a.decision === 'denied'
        ? `<span style="color:var(--red);font-size:11px;">${t('denied')}</span>`
        : '';

  // Build full content for expand (tool_input as JSON if available)
  const fullContent = (() => {
    const ti = a.tool_input || {};
    if (ti.command) return ti.command;
    if (ti.file_path) return ti.file_path + (ti.content ? '\n' + ti.content : '') + (ti.old_string ? '\n--- old ---\n' + ti.old_string + '\n--- new ---\n' + (ti.new_string || '') : '');
    if (ti.prompt) return ti.prompt;
    if (ti.pattern) return ti.pattern;
    return detail;
  })();

  const preview = fullContent ? fullContent.split('\n').slice(0, 3).join('\n') : '';
  const hasMore = fullContent && (fullContent.split('\n').length > 3 || fullContent.length > 200);

  return `
    <div class="activity-item-desktop ${actClass}${isExpanded ? ' expanded' : ''}" onclick="toggleActivityExpand(${idx})">
      <div class="act-header">
        <span style="flex-shrink:0;">${d.icon}</span>
        <span style="font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(d.verb)}</span>
        ${decisionLabel}
        ${sessionTag(a.session_id)}
        <span class="activity-time">${timeAgo(a.timestamp)}</span>
      </div>
      ${fullContent ? `<div class="act-preview">${esc(isExpanded ? fullContent : preview)}</div>` : ''}
      ${hasMore && !isExpanded ? `<div class="act-expand-hint">${t('Click to expand')}</div>` : ''}
    </div>
  `;
}

function renderDesktopMain() {
  const main = document.getElementById('desktopMain');
  const leftPane = document.getElementById('desktopPaneLeft');
  const rightPane = document.getElementById('desktopPaneRight');
  if (!main || !leftPane || !rightPane) return;

  // For non-split views, use single pane
  if (desktopNavTab) {
    main.style.gridTemplateColumns = '1fr';
    rightPane.style.display = 'none';
    leftPane.classList.remove('desktop-pane-left');

    let content = '';
    switch (desktopNavTab) {
      case 'requests': content = `<div class="pane-title">${t('Requests')}</div>` + renderRequests(); break;
      case 'claims': content = `<div class="pane-title">${t('Claims')}</div>` + renderClaims(); break;
      case 'sprint': content = `<div class="pane-title">${t('Sprint')}</div>` + renderSprint(); break;
      case 'rules': content = `<div class="pane-title">${t('Rules')}</div>` + renderRules(); break;
      case 'agents': content = `<div class="pane-title">${t('Agents')}</div>` + renderAgents(); break;
    }
    leftPane.innerHTML = content;
    return;
  }

  // Split view: permissions left, activity right
  rightPane.style.display = '';
  leftPane.classList.add('desktop-pane-left');

  const allPerms = state.pending.filter(p => !isRequest(p.tool_name || '') && !resolvedRequests.has(p.requestId));
  const perms = filterBySession(allPerms);
  const allReqs = state.pending.filter(p => isRequest(p.tool_name || '') && !resolvedRequests.has(p.requestId));
  const reqs = filterBySession(allReqs);

  // r369: dynamic split pane — expand activity when no pending
  const hasPending = perms.length + reqs.length > 0;
  const wasPreviouslyCollapsed = main.dataset.splitState === 'collapsed';
  if (hasPending) {
    main.style.gridTemplateColumns = '55fr 45fr';
    leftPane.classList.remove('pane-collapsed');
    // Flash the left pane when it first appears
    if (wasPreviouslyCollapsed) {
      leftPane.classList.add('pane-flash');
      setTimeout(() => leftPane.classList.remove('pane-flash'), 800);
    }
    main.dataset.splitState = 'split';
  } else {
    main.style.gridTemplateColumns = '0fr 1fr';
    leftPane.classList.add('pane-collapsed');
    main.dataset.splitState = 'collapsed';
  }

  // Left pane: permissions + requests
  const permCount = perms.length + reqs.length;
  let leftContent = `<div class="pane-title">${t('Pending')} ${permCount > 0 ? `<span class="pane-count">${permCount}</span>` : ''}</div>`;

  if (reqs.length > 0) {
    leftContent += reqs.map(p => {
      const ti = p.tool_input || {};
      const prompt = ti.prompt || p.prompt || (ti.questions && ti.questions[0] && ti.questions[0].question) || '';
      const options = p.options || (ti.questions && ti.questions[0] && ti.questions[0].options) || [];
      const isNew = !seenCardIds.has(p.requestId);
      const elapsed = Math.floor((Date.now() - (p.timestamp || Date.now())) / 1000);
      const remaining = Math.max(0, 120 - elapsed);
      const timerColor = remaining < 30 ? 'var(--red)' : remaining < 60 ? 'var(--orange)' : 'var(--dim)';
      return `
        <div class="perm-card question-card${isNew ? ' new-card' : ''}" id="perm-${p.requestId}" data-session-id="${esc(p.session_id || '')}" role="region" aria-label="Question from Claude Code">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="tool-name">${t('Question from Claude')} ${sessionTag(p.session_id)}</div>
            <span class="countdown" data-expires="${(p.timestamp || Date.now()) + 120000}" style="font-size:12px;font-weight:700;color:${timerColor};font-variant-numeric:tabular-nums;" aria-label="Time remaining: ${remaining} seconds" role="timer">${remaining}s</span>
          </div>
          <div class="meta">${_tf.format(new Date(p.timestamp || Date.now()))}</div>
          <div class="tool-input">${esc(prompt)}</div>
          ${options.length > 0 ? `<div style="display:flex;flex-direction:column;gap:6px;margin:8px 0;" role="group" aria-label="Response options">${options.map((o, i) => `
            <button class="btn opt-btn" data-rid="${esc(p.requestId)}" data-val="${esc(o.label)}" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);text-align:start;padding:10px 12px;border-radius:8px;" aria-label="Select option: ${esc(o.label)}">
              <strong>${esc(o.label)}</strong>${o.description ? `<br><span style="font-size:11px;color:var(--dim);">${esc(o.description)}</span>` : ''}
            </button>`).join('')}</div>` : ''}
          <textarea class="question-input" id="question-input-${esc(p.requestId)}" aria-label="Type your response to Claude Code" placeholder="${t('Type your response...')}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();respondToQuestion('${esc(p.requestId)}')}"></textarea>
          <div class="perm-actions">
            <button class="btn btn-blue" onclick="respondToQuestion('${esc(p.requestId)}')" aria-label="${t('Send response to Claude Code')}">${t('Send Response')}</button>
          </div>
        </div>
      `;
    }).join('');
  }

  if (perms.length > 0) {
    leftContent += perms.map(p => renderPermissionCard(p)).join('');
  }

  if (permCount === 0) {
    leftContent += `<div class="empty"><div class="icon" style="font-size:14px;">--</div><p>${t('No pending items')}</p><p style="font-size:12px;margin-top:4px;">${t('Permissions and requests will appear here')}</p></div>`;
  }
  leftPane.innerHTML = leftContent;

  // Right pane: activity feed
  const filtered = filterBySession(state.activity);
  const activityItems = [...filtered].reverse();

  let rightContent = `<div class="pane-title">${t('Activity')} <span class="pane-count">${activityItems.length}</span></div>`;
  if (activityItems.length === 0) {
    rightContent += `<div class="empty"><div class="icon" style="font-size:14px;">--</div><p>${t('No activity yet')}</p></div>`;
  } else {
    rightContent += activityItems.map((a, idx) => renderDesktopActivityItem(a, idx)).join('');
  }
  rightPane.innerHTML = rightContent;
}

// --- Render ---
function render() {
  updateBadge();
  updateTrustBadge();

  renderSessionBar();

  if (isDesktop()) {
    // Desktop: sidebar + split pane (CSS hides .content, .tabs, .session-bar)
    renderDesktopSidebar();
    renderDesktopMain();
  }

  // Mobile/tablet: original tab-based layout (CSS hides .desktop-sidebar, .desktop-main)
  // Always render to keep state in sync for resize transitions
  const el = document.getElementById('content');
  switch (activeTab) {
    case 'permissions': el.innerHTML = renderPermissions(); break;
    case 'requests': el.innerHTML = renderRequests(); break;
    case 'activity': el.innerHTML = renderActivity(); break;
    case 'claims': el.innerHTML = renderClaims(); break;
    case 'sprint': el.innerHTML = renderSprint(); break;
    case 'rules': el.innerHTML = renderRules(); break;
    case 'agents': el.innerHTML = renderAgents(); break;
  }

  // Mark rendered cards as seen
  state.pending.forEach(p => seenCardIds.add(p.requestId));
  // Update agents badge
  const ab = document.getElementById('agentBadge');
  const running = state.agents.filter(a => a.status === 'running').length;
  ab.style.display = running > 0 ? 'inline-block' : 'none';
  ab.textContent = running;
  ab.style.background = 'var(--accent)';
}

async function sendFeedback() {
  const input = document.getElementById('feedbackInput');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  try {
    const resp = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ content: text, token: TOKEN }),
    });
    if (resp.ok) { feedbackPending = true; feedbackSent = text; render(); }
  } catch {}
}

function describePermission(p) {
  const t = p.tool_name || '';
  const i = p.tool_input || {};
  if (t === 'Bash') return { icon: SVG_ICONS.bash, title: 'Run command', detail: i.command || '', danger: /\brm\b|sudo|--force|--hard/.test(i.command || '') };
  if (t === 'Edit') return { icon: SVG_ICONS.write, title: 'Edit file', detail: i.file_path || '' };
  if (t === 'Write') return { icon: SVG_ICONS.write, title: 'Create/overwrite file', detail: i.file_path || '' };
  if (t === 'Agent') return { icon: SVG_ICONS.agent, title: 'Launch agent', detail: i.description || '' };
  if (t === 'Read') return { icon: SVG_ICONS.read, title: 'Read file', detail: i.file_path || '' };
  return { icon: SVG_ICONS.gear, title: `${t} permission`, detail: formatInput(i) };
}

// r372: risk severity assessment
function getRiskLevel(toolName, toolInput) {
  const safeTools = ['Read', 'Glob', 'Grep', 'Explore', 'WebSearch', 'WebFetch'];
  const writeTools = ['Edit', 'Write', 'NotebookEdit'];
  if (safeTools.includes(toolName)) return 'safe';
  if (writeTools.includes(toolName)) return 'write';
  if (toolName === 'Bash') {
    const cmd = (toolInput && toolInput.command) || '';
    const dangerPatterns = /\brm\b|\bgit\s+push\b|\bgit\s+reset\b|\bkill\b|\bdrop\b|\bdelete\b|\bforce\b|--force|--hard|\bsudo\b/i;
    if (dangerPatterns.test(cmd)) return 'danger';
    return 'danger'; // Bash is always at least danger-level
  }
  return 'write'; // unknown tools default to write-level caution
}

const RISK_LABELS = { safe: 'SAFE', write: 'WRITE', danger: 'DANGER' };

  const readTools = ['Read', 'Grep', 'Glob'];
  const toolName = p.tool_name || '';
  const isReadTool = readTools.includes(toolName);

  const isNew = !seenCardIds.has(p.requestId);
  return `
    <div class="perm-card risk-${risk}${isNew ? ' new-card' : ''}" id="perm-${p.requestId}" data-session-id="${esc(p.session_id || '')}">
      <div class="tool-name">${desc.icon} ${esc(desc.title)} <span class="risk-badge risk-${risk}">${RISK_LABELS[risk]}</span> ${sessionTag(p.session_id)}</div>
      <div class="tool-input" style="font-family:monospace;font-size:12px;background:var(--bg);padding:8px;border-radius:6px;margin:6px 0;word-break:break-all;">${esc(desc.detail)}</div>
      <div class="perm-actions" role="group" aria-label="Actions for ${esc(desc.title)}">
        <button class="btn btn-allow" onclick="decide('${esc(p.requestId)}', true)" aria-label="${t('Allow')} ${esc(desc.title)}">&#10003; ${t('Allow')}</button>
        <button class="btn btn-deny" onclick="decide('${esc(p.requestId)}', false)" aria-label="${t('Deny')} ${esc(desc.title)}">&#10005; ${t('Deny')}</button>
        <div class="quick-rules">
          <button class="quick-rules-btn" onclick="toggleQuickRulesMenu('${esc(p.requestId)}', event)" aria-expanded="${openQuickRules === p.requestId}" aria-haspopup="true" aria-label="Quick rules for ${esc(toolName)}">${t('Quick Rules')} &#9662;</button>

            ${isReadTool ? `<div class="qr-item" role="menuitem" tabindex="0" onclick="addQuickRuleGroup(['Read','Grep','Glob']); decide('${esc(p.requestId)}', true)">${ t('Always allow all {tools}', { tools: '<strong>' + t('Read tools') + '</strong>' }) }</div>` : ''}
            ${toolName === 'Edit' || toolName === 'Write' ? `<div class="qr-item" role="menuitem" tabindex="0" onclick="addQuickRuleGroup(['Edit','Write']); decide('${esc(p.requestId)}', true)">${ t('Always allow all {tools}', { tools: '<strong>' + t('Write tools') + '</strong>' }) }</div>` : ''}
            ${toolName === 'WebFetch' || toolName === 'WebSearch' ? `<div class="qr-item" role="menuitem" tabindex="0" onclick="addQuickRuleGroup(['WebFetch','WebSearch']); decide('${esc(p.requestId)}', true)">${ t('Always allow all {tools}', { tools: '<strong>' + t('Web tools') + '</strong>' }) }</div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function describeAction(a) {
  const t = a.tool_name || '';
  const i = a.tool_input || {};
  if (t === 'Read') return { icon: SVG_ICONS.read, verb: 'Read file', detail: i.file_path || '' };
  if (t === 'Write') return { icon: SVG_ICONS.write, verb: 'Wrote file', detail: i.file_path || '' };
  if (t === 'Edit') return { icon: SVG_ICONS.write, verb: 'Edited file', detail: i.file_path || '' };
  if (t === 'Bash') return { icon: SVG_ICONS.bash, verb: 'Ran command', detail: i.command || '' };
  if (t === 'Grep') return { icon: SVG_ICONS.search, verb: 'Searched', detail: `"${i.pattern || ''}" ${i.path ? 'in ' + i.path : ''}` };
  if (t === 'Glob') return { icon: SVG_ICONS.folder, verb: 'Found files', detail: i.pattern || '' };
  if (t === 'Agent') return { icon: SVG_ICONS.agent, verb: 'Launched agent', detail: i.description || i.subagent_type || '' };
  if (t === 'WebFetch') return { icon: SVG_ICONS.web, verb: 'Fetched URL', detail: i.url || '' };
  if (t === 'WebSearch') return { icon: SVG_ICONS.search, verb: 'Web search', detail: i.query || '' };
  if (t === 'Notification' || a.type === 'info') return { icon: SVG_ICONS.info, verb: 'Info', detail: i.prompt || '' };
  return { icon: SVG_ICONS.gear, verb: t, detail: formatInput(i) };
}

function renderActivity() {
  const filtered = filterBySession(state.activity);
  if (filtered.length === 0) {
    return `<div class="empty"><div class="icon" style="font-size:14px;">--</div><p>${t('No activity yet')}</p><p style="font-size:12px;margin-top:4px;">${t('Tool calls will appear here as Claude Code works')}</p></div>`;
  }
  return [...filtered].reverse().map(a => {
    const d = describeAction(a);
    const failCls = a.type === 'failure' ? ' style="border-inline-start:2px solid var(--red);padding-inline-start:8px;"' : '';
    const decisionLabel = a.decision === 'auto-allowed'
      ? ` <span style="color:var(--green);font-size:11px;">${t('auto')}</span>`
      : a.decision === 'allowed'
        ? ` <span style="color:var(--green);font-size:11px;">${t('approved')}</span>`
        : a.decision === 'denied'
          ? ` <span style="color:var(--red);font-size:11px;">${t('denied')}</span>`
          : '';
    return `
      <div class="activity-item"${failCls} data-session-id="${esc(a.session_id || '')}">
        <div class="activity-icon" style="font-size:16px;">${d.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:500;">${esc(d.verb)}${decisionLabel} ${sessionTag(a.session_id)}</div>
          <div class="activity-detail" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(d.detail)}</div>
        </div>
        <div class="activity-time">${timeAgo(a.timestamp)}</div>
      </div>
    `;
  }).join('');
}

function renderClaims() {
  if (!state.claims || !state.claims.claims) {

  }

  const claims = state.claims.claims;
  const topics = [...new Set(claims.map(c => c.topic))];

  let filtered = topicFilter ? claims.filter(c => c.topic === topicFilter) : claims;

  return `
    <div class="topic-filters">
      <div class="topic-chip ${!topicFilter ? 'active' : ''}" onclick="topicFilter=null;render()">All (${claims.length})</div>

    return `

      const evColors = { stated: '#94a3b8', web: '#60a5fa', documented: '#a78bfa', tested: '#34d399', production: '#fbbf24' };

function renderRules() {
  const categories = [
    { name: 'Read tools', tools: ['Read', 'Grep', 'Glob'] },
    { name: 'Write tools', tools: ['Edit', 'Write'] },
    { name: 'Execution', tools: ['Bash'] },
    { name: 'Web', tools: ['WebFetch', 'WebSearch'] },

  const activeRuleSet = new Set(state.sessionRules.filter(r => !r.pattern).map(r => r.tool));

  return `
    <div class="rules-section">
      <h3>${t('Trust Level')}</h3>
      <div class="trust-selector" role="radiogroup" aria-label="Trust level selection">
        <div class="trust-btn ${state.trustLevel === 'paranoid' ? 'active' : ''}" onclick="setTrustLevel('paranoid')" role="radio" tabindex="0" aria-checked="${state.trustLevel === 'paranoid'}" aria-label="Paranoid: Approve everything manually">
          <span class="trust-label">${t('Paranoid')}</span>
          <span class="trust-desc">${t('Approve everything manually')}</span>

        <div class="trust-btn ${state.trustLevel === 'standard' ? 'active' : ''}" onclick="setTrustLevel('standard')" role="radio" tabindex="0" aria-checked="${state.trustLevel === 'standard'}" aria-label="Standard: Auto-approve read and web tools">
          <span class="trust-label">${t('Standard')}</span>
          <span class="trust-desc">${t('Auto-approve Read, Grep, Glob, WebSearch, WebFetch')}</span>
        </div>
        <div class="trust-btn ${state.trustLevel === 'autonomous' ? 'active' : ''}" onclick="setTrustLevel('autonomous')" role="radio" tabindex="0" aria-checked="${state.trustLevel === 'autonomous'}" aria-label="Autonomous: Auto-approve all except dangerous Bash">
          <span class="trust-label">${t('Autonomous')}</span>
          <span class="trust-desc">${t('Auto-approve all except dangerous Bash (rm, push, sudo...)')}</span>
        </div>
      </div>
    </div>

    <div class="rules-section">
      <h3>${t('Session Rules')}</h3>
      <p style="font-size:12px;color:var(--dim);margin-bottom:16px;">${t('Toggle tools to auto-approve for this session. These override trust level.')}</p>
      ${categories.map(cat => `
        <div class="rule-category">
          <div class="rule-category-title">${esc(cat.name)}</div>
          <div class="rule-checkboxes">
            ${cat.tools.map(tool => {
              const isActive = activeRuleSet.has(tool);
              return `
                <label class="rule-check ${isActive ? 'active' : ''}" onclick="toggleRule('${esc(tool)}')">
                  <input type="checkbox" ${isActive ? 'checked' : ''}>
                  <span>${isActive ? '&#10003; ' : ''}${esc(tool)}</span>

              `;
            }).join('')}
          </div>
        </div>

    <div class="rules-section">
      <h3>${t('Active Auto-Approve Rules')}</h3>
