        ? `<p style="font-size:12px;color:var(--dim);">${t('No custom session rules active. Use checkboxes above or Quick Rules on permission cards.')}</p>`
        : `<div class="active-rules-list">
            ${state.sessionRules.map(r => `
              <div class="active-rule-item">
                <span class="rule-tool">${esc(r.tool)}</span>
                ${r.pattern ? `<span class="rule-pattern">${esc(r.pattern)}</span>` : '<span class="rule-pattern">all</span>'}
                <span class="rule-remove" onclick="removeRule('${esc(r.tool)}', '${esc(r.pattern || '')}')" title="Remove rule" role="button" tabindex="0" aria-label="Remove rule for ${esc(r.tool)}">&#10005;</span>
              </div>
            `).join('')}
          </div>`
      }
    </div>
  `;
}

function renderMessages() {
  if (state.messages.length === 0) {
    return `<div class="empty"><div class="icon" style="font-size:14px;">--</div><p>${t('No messages yet')}</p><p style="font-size:12px;margin-top:4px;">${t("Claude's text responses will appear here")}</p></div>`;
  }
  return [...state.messages].reverse().map(m => `
    <div style="background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border);border-inline-start:3px solid var(--accent);">
      <div style="font-size:12px;color:var(--dim);margin-bottom:8px;">${timeAgo(m.timestamp)}</div>
      <div style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;">${esc(m.content)}</div>
    </div>
  `).join('');
}

function renderAgents() {
  const running = state.agents.filter(a => a.status === 'running');
  const done = state.agents.filter(a => a.status === 'done');

  if (state.agents.length === 0) {
    return `<div class="empty"><div class="icon" style="font-size:14px;">--</div><p>${t('No agents detected')}</p><p style="font-size:12px;margin-top:4px;">${t('Subagents will appear here when Claude Code spawns them.')}<br>${t('Requires SubagentStart/SubagentStop hooks.')}</p></div>`;
  }

  return `
    ${running.length > 0 ? `
      <div class="rules-section">
        <h3>${t('Running')} (${running.length})</h3>
        ${running.map(a => `
          <div class="active-rule-item" style="border-inline-start:3px solid var(--green);padding-inline-start:16px;">
            <div>
              <span class="rule-tool">${esc(a.agent_type || a.description || 'Agent')}</span>
              <div style="font-size:11px;color:var(--dim);margin-top:2px;">${esc(a.id || '').slice(0,12)} · ${t('started')} ${timeAgo(a.startedAt)}</div>
              ${a.prompt ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;max-height:60px;overflow:hidden;">${esc((a.prompt||'').slice(0,200))}</div>` : ''}
            </div>
            <div style="font-size:20px;animation:pulse 2s infinite;">&#9679;</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${done.length > 0 ? `
      <div class="rules-section">
        <h3>${t("Completed")} (${done.length})</h3>
        ${done.map(a => `
          <div class="active-rule-item" style="border-inline-start:3px solid var(--dim);padding-inline-start:16px;opacity:0.7;">
            <div>
              <span style="font-weight:600;color:var(--muted);">${esc(a.agent_type || a.description || 'Agent')}</span>
              <div style="font-size:11px;color:var(--dim);margin-top:2px;">${esc(a.id || '').slice(0,12)} · ${t('ran')} ${timeAgo(a.startedAt)} ${a.stoppedAt ? '— ' + t('done') + ' ' + timeAgo(a.stoppedAt) : ''}</div>
            </div>
            <span style="color:var(--green);">&#10003;</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

// --- Helpers ---
function formatInput(input) {
  if (!input) return '';
  if (input.command) return input.command;
  if (input.file_path) return `${input.file_path}${input.content ? '\n' + input.content.slice(0, 500) : ''}`;
  if (input.pattern) return `pattern: ${input.pattern}`;
  if (input.prompt) return input.prompt.slice(0, 300);
  return JSON.stringify(input, null, 2).slice(0, 500);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 5) return t('now');
  if (diff < 60) return t('{diff}s ago', { diff });
  if (diff < 3600) return t('{diff}m ago', { diff: Math.floor(diff/60) });
  return t('{diff}h ago', { diff: Math.floor(diff/3600) });
}

// --- Tabs (a11y: aria-selected + keyboard nav) ---
function activateTab(tab) {
  document.querySelectorAll('.tab').forEach(tb => {
    tb.classList.remove('active');
    tb.setAttribute('aria-selected', 'false');
  });
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
  activeTab = tab.dataset.tab;
  render();
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => activateTab(tab));
  tab.addEventListener('keydown', (e) => {
    const tabs = [...document.querySelectorAll('.tab')];
    const idx = tabs.indexOf(tab);
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const next = e.key === 'ArrowRight' ? (idx + 1) % tabs.length : (idx - 1 + tabs.length) % tabs.length;
      tabs[next].focus();
      activateTab(tabs[next]);
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      activateTab(tab);
    }
  });
});

// Close quick-rules dropdowns on outside click
document.addEventListener('click', (e) => {
  const optBtn = e.target.closest('.opt-btn');
  if (optBtn) {
    e.preventDefault();
    respondToQuestion(optBtn.dataset.rid, optBtn.dataset.val);
    return;
  }
  if (!e.target.closest('.quick-rules') && openQuickRules) {
    openQuickRules = null;
    render();
  }
});

// --- Service Worker + Notifications ---
let swReg = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    swReg = reg;
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }).catch(() => {});
}
function notify(title, body, tag) {
  if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  if (swReg) {
    swReg.showNotification(title, { body, tag });
  } else {
    new Notification(title, { body, tag });
  }
}

// --- r373: Keyboard shortcuts for approve/deny ---
let kbFocusedIndex = 0; // 0-based index of focused pending permission

document.addEventListener('keydown', (e) => {
  // Skip if user is typing in an input or textarea
  const active = document.activeElement;
  if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT' || active.isContentEditable)) return;
  // Skip if preview overlay is open
  if (document.getElementById('previewOverlay')?.classList.contains('open')) return;
  // Only operate on desktop split view with pending permissions
  if (!isDesktop() || desktopNavTab) return;

  const pendingPerms = state.pending.filter(p => !isRequest(p.tool_name || '') && !resolvedRequests.has(p.requestId));
  const filteredPerms = filterBySession(pendingPerms);
  if (filteredPerms.length === 0) return;

  // Number keys 1-9: focus/select Nth pending item
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < filteredPerms.length) {
      kbFocusedIndex = idx;
      highlightFocusedCard(filteredPerms);
    }
    e.preventDefault();
    return;
  }

  // Clamp focus index
  if (kbFocusedIndex >= filteredPerms.length) kbFocusedIndex = 0;

  // 'a' = approve focused
  if (e.key === 'a' || e.key === 'A') {
    const p = filteredPerms[kbFocusedIndex];
    if (p) decide(p.requestId, true);
    e.preventDefault();
    return;
  }

  // 'd' = deny focused
  if (e.key === 'd' || e.key === 'D') {
    const p = filteredPerms[kbFocusedIndex];
    if (p) decide(p.requestId, false);
    e.preventDefault();
    return;
  }

  // Enter = approve focused (confirm action)
  if (e.key === 'Enter') {
    const p = filteredPerms[kbFocusedIndex];
    if (p) decide(p.requestId, true);
    e.preventDefault();
    return;
  }
});

function highlightFocusedCard(perms) {
  // Remove previous highlights
  document.querySelectorAll('.perm-card.kb-focused').forEach(el => el.classList.remove('kb-focused'));
  // Add highlight to focused card
  if (perms[kbFocusedIndex]) {
    const card = document.getElementById('perm-' + perms[kbFocusedIndex].requestId);
    if (card) {
      card.classList.add('kb-focused');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

// --- Boot ---
connect();
</script>
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-bar">
    <span class="preview-title" id="previewTitle"></span>
    <button class="preview-close" onclick="closePreview()">Close</button>
  </div>
  <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>
<script>
function openPreview(url, title) {
  document.getElementById('previewTitle').textContent = title || t('Preview');
  document.getElementById('previewFrame').src = url;
  document.getElementById('previewOverlay').classList.add('open');
}
function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  document.getElementById('previewFrame').src = 'about:blank';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

// Load sites from API
fetch('/api/sites?token=' + TOKEN).then(r => r.json()).then(sites => {
  const grid = document.getElementById('sitesGrid');
  if (!grid) return;
  grid.innerHTML = sites.map(s => {
    const c = s.color || '#94a3b8';
    return '<a href="#" onclick="openPreview(\'/sites/' + s.name + '?token=' + TOKEN + '\',\'' + s.name + '\');return false;" style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:10px;color:var(--text);text-decoration:none;-webkit-tap-highlight-color:rgba(59,130,246,0.2);">' +
      '<div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:' + c + '20;color:' + c + ';flex-shrink:0;">' + (s.name||'?')[0] + '</div>' +
      '<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;">' + s.name + '</div><div style="font-size:10px;color:var(--dim);">' + (s.description||'') + '</div></div>' +
      '<span style="color:var(--dim);font-size:16px;">&#8250;</span></a>';
  }).join('');
}).catch(() => {
  const grid = document.getElementById('sitesGrid');
  if (grid) grid.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:12px;">' + t('Could not load sites') + '</div>';
});
</script>
</body>
